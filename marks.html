<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marks</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body {
  display:flex;
  background:#0b1220;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  height:100vh;
  background:#0f172a;
  padding:20px;
}

.sidebar h2 {
  margin-bottom:25px;
}

.sidebar a {
  display:block;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  color:#94a3b8;
  text-decoration:none;
}

.sidebar a.active,
.sidebar a:hover {
  background:linear-gradient(90deg,#7c3aed,#4f46e5);
  color:white;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* HEADER */
h1 {
  margin-bottom:20px;
}

/* STATS */
.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-bottom:25px;
}

.card {
  background:#111827;
  padding:20px;
  border-radius:14px;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-3px);
}

/* TABLE */
.table {
  background:#111827;
  border-radius:14px;
  padding:20px 25px;
}

/* ROW STRUCTURE (FIXED ALIGNMENT) */
.row {
  display:grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid #1f2937;
}

.header {
  font-weight:600;
  color:#cbd5f5;
}

/* COLUMN ALIGNMENT */
.row span:nth-child(2) {
  text-align:center;
}

.row span:nth-child(3) {
  text-align:right;
}

/* STATUS COLORS */
.excellent { color:#22c55e; }
.good { color:#3b82f6; }
.average { color:#f59e0b; }
.low { color:#ef4444; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Parayana E-Techno School</h2>
  

  <a href="index.html">Dashboard</a>
  <a href="timetable.html">Timetable</a>
  <a href="attendance.html">Attendance</a>
  <a href="marks.html" class="active">Marks</a>
  <a href="homework.html">Homework</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>My Marks</h1>

<!-- STATS -->
<div class="cards">

  <div class="card">
    Total Marks<br>
    <h2>425 / 500</h2>
  </div>

  <div class="card">
    Percentage<br>
    <h2>85%</h2>
  </div>

  <div class="card">
    Grade<br>
    <h2 class="excellent">A</h2>
  </div>

</div>

<!-- TABLE -->
<div class="table">

  <div class="row header">
    <span>Subject</span>
    <span>Marks</span>
    <span>Status</span>
  </div>

  <div class="row">
    <span>Mathematics</span>
    <span>95</span>
    <span class="excellent">Excellent</span>
  </div>

  <div class="row">
    <span>Science</span>
    <span>88</span>
    <span class="good">Good</span>
  </div>

  <div class="row">
    <span>English</span>
    <span>82</span>
    <span class="good">Good</span>
  </div>

  <div class="row">
    <span>Hindi</span>
    <span>81</span>
    <span class="good">Good</span>
  </div>

  <div class="row">
    <span>Social Science</span>
    <span>79</span>
    <span class="good">Good</span>
  </div>

</div>

</div>

</body>
</html>
